seed: 42

audio:
  sample_rate: 24000
  encodec_model_name: facebook/encodec_24khz
  encodec_bandwidth: 6.0
  codebook_size: 1024
  num_codebooks: 8

data:
  train_manifest: data/train_sep_manifest.json
  valid_manifest: data/valid_sep_manifest.json
  train_cache: artifacts/sep/train_encodec_sep.pt
  valid_cache: artifacts/sep/valid_encodec_sep.pt
  max_frames: 1200
  batch_size: 2
  num_workers: 2

model:
  d_model: 1024
  num_layers: 18
  num_heads: 16
  ffn_dim: 3072
  dropout: 0.0
  max_seq_len: 4096
  sliding_window: 1024
  prompt_mode: none
  prompt_dim: 1024
  residual_loss_weight: 0.5

train:
  epochs: 20
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip: 1.0
  amp: true
  log_interval: 20
  valid_interval: 1

paths:
  checkpoints: artifacts/sep/checkpoints
  outputs: artifacts/sep/outputs
